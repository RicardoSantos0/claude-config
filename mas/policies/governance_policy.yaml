# ============================================================
# GOVERNANCE POLICY
# Core rules that all agents must follow at all times.
# ============================================================

governance_policy:

  # --- CORE PRINCIPLES ---
  principles:
    reuse_before_creation:
      description: >
        Always try to use an approved existing agent or skill
        before attempting to create a new one.
      enforcement: "HR capability search is mandatory before any spawn request"

    document_before_forgetting:
      description: >
        Significant project decisions and artifacts must be written
        into durable project memory, not left in transient context.
      enforcement: "Scribe records every handoff, decision, and artifact"

    improve_only_through_evidence:
      description: >
        Training and skill updates must be grounded in Evaluator
        findings, not informal intuition.
      enforcement: "Trainer proposals require minimum 1 evaluation report"

  # --- HANDOFF RULES ---
  handoff_rules:
    - "Every agent-to-agent transfer MUST use the formal handoff protocol"
    - "Every handoff MUST be authorized by the Master Orchestrator"
    - "The receiving agent MUST explicitly accept or reject"
    - "A rejected handoff returns to the sender with rejection reason"
    - "No agent may begin work without an accepted handoff"
    - "The Scribe records every handoff in project memory"

  # --- AUTHORITY BOUNDARIES ---
  authority_rules:
    - "No agent may write to shared state fields it does not own"
    - "No agent may spawn another agent without a gap certificate"
    - "No agent may escalate authority without Master approval"
    - "No agent may delete any record"
    - "Spawned agents (T3) cannot spawn other agents"
    - "Trainer at L0 cannot apply changes — advisory only"

  # --- SHARED STATE RULES ---
  shared_state_rules:
    - "Shared state is the single source of truth"
    - "No agent may maintain private state that contradicts shared state"
    - "All writes go through SharedStateManager with access control checks"
    - "Immutable fields cannot be changed after approval"
    - "Append-only fields reject write operations"

  # --- ESCALATION TO HUMAN ---
  human_escalation_triggers:
    - "Risk classification is 'critical'"
    - "A consultant raises an unresolvable concern"
    - "Two consecutive spawn requests are denied"
    - "A phase is blocked after retry"
    - "All consultants unanimously flag high-risk"
    - "Master needs to override unanimous consultant recommendation"
    - "Trust tier promotion requested"
    - "Governance policy change requested"
    - "Trainer L1 or L2 promotion requested"

  # --- FIELD OWNERSHIP — common violation patterns (prop-1451d23c, prop-a3c10b35, prop-ff0c52b0, prop-6d61732c) ---
  field_ownership_guidance:
    description: >
      SharedStateManager.write/append require a valid agent_id that owns the target field.
      Using a section name (e.g. "project_definition") as agent_id causes unauthorized_write
      violations. Always pass the governing agent's id (e.g. "master_orchestrator",
      "scribe_agent", "product_manager_agent") — not the section name.
    ownership_quick_reference:
      project_definition.success_criteria: "inquirer_agent | product_manager_agent | master_orchestrator"
      project_definition.acceptance_criteria: "inquirer_agent | product_manager_agent | master_orchestrator"
      decisions.decision_log: "scribe_agent | master_orchestrator | __system__"
      workflow.completed_phases: "append_only — use SharedStateManager.append with master_orchestrator"
    common_mistakes:
      - "Using section name as agent_id ('project_definition', 'decisions')"
      - "Calling .write() on append_only fields — use .append() instead"
      - "Using master_orchestrator for fields exclusively owned by specialist agents"

  # --- GRAPH CONTRIBUTION — closure requirement (prop-1d62c672, prop-c3778a9a) ---
  graph_contribution_policy:
    description: >
      Deprecated. Graph memory is no longer a required closure path. Do not block
      project closure on EpisodeWriter replay or migrate-graph; the supported direction
      is SQL-backed retrieval and future storage replacement.
    required_at: "not required"
    command: "none"

  # --- CONSULTANT PANEL COMPOSITION ---
  consultant_panel_policy:
    description: >
      Master Orchestrator MUST specify which consultants to invoke via
      consultation_trigger.consultants. The orchestration engine adds no defaults.
      This ensures master owns the panel composition decision, not the engine.
    rules:
      - "consultation_trigger MUST include a consultants list when invoking consultation"
      - "Engine-side default consultant lists are prohibited — master decides the panel"
      - "Targeting zero consultants (empty list) is not permitted; minimum one consultant required"
      - "Full panel (all five) is appropriate only for critical or governance-level decisions"
    available_consultants:
      - risk_advisor
      - quality_advisor
      - devils_advocate
      - domain_expert
      - efficiency_advisor

  # --- HR DEPLOYMENT ROUTING ---
  hr_deployment_routing:
    description: >
      When HR produces a DeploymentPlan, Master Orchestrator MUST route work
      using that plan as the primary routing authority. Master does not re-derive
      routing independently after HR has spoken.
    rules:
      - "Master MUST read HR's deploy array before issuing any handoffs post capability_discovery"
      - "Each 'ready' entry in the DeploymentPlan maps directly to one handoff: to_agent=entry.agent, task=entry.task"
      - "Handoffs MUST be issued in the order HR listed them (HR orders by dependency)"
      - "HR's suggested_payload fields MUST be passed through to the receiving agent's handoff payload"
      - "Any delegation to an agent NOT in HR's ready list is a ROUTING OVERRIDE and must be logged"
    override_policy:
      allowed: true
      conditions:
        - "Recommended agent is unavailable (probation, retired, or context HR lacked)"
        - "A consultant has raised a specific concern about the recommended agent"
        - "Master has project-specific information HR could not know at discovery time"
      required_log_fields:
        - override_of: "hr_deployment_recommendation"
        - hr_plan_agents: "list of agents HR recommended"
        - rationale: "why the override is necessary (required — not optional)"
      violation_if_missing: true
      note: "Override without a decision log entry is a governance violation, not a warning"

  # --- PROJECT INIT GATE ---
  project_init_gate:
    description: >
      Before dispatching ANY agent (including Scribe, Inquirer, or delivery agents),
      Master Orchestrator MUST verify that shared_state.yaml exists for the project.
      This file is created by `uv run mas init {slug}`. Its absence means the project
      has not been properly registered and no agent delegation is authorised.
    rules:
      - "Run `uv run mas init {slug}` before any other action on a new project"
      - "Use Glob to verify `mas/projects/{project_id}/shared_state.yaml` exists before dispatching"
      - "If init fails, report the error to the user — do not substitute prose for the missing state"
      - "Dispatching any agent without a confirmed shared_state.yaml is a governance violation"
    violation_type: "pre_dispatch_init_missing"
    severity: "high"

  # --- LITE PROJECT GATE ---
  lite_project_gate:
    description: >
      The lite workflow (mas/templates/lite_project_template.yaml) is an authorised
      abbreviation for small-scope tasks. It is NOT a bypass of shared state or
      artifact requirements. Lite projects still require: shared_state.yaml,
      planning/product_plan.yaml, planning/execution_plan.yaml,
      evaluation/project_evaluation.yaml, and a Scribe-written CHECKPOINT.md.
    rules:
      - "Lite workflow is only valid for ≤5 file changes with no architecture decisions"
      - "Master must explicitly record the lite routing decision in decisions/decision_log.yaml"
      - "All four required artifacts must exist on disk before the project can be closed"

  # --- VIOLATION HANDLING ---
  violations:
    logging: "All violations are logged with full context"
    agent_threshold: 3  # Violations before human escalation
    block_before_execute: true  # Violations are blocked, not rolled back
