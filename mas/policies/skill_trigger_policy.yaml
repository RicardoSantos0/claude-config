# MAS Skill Trigger Policy
# Defines when skill use is recommended or required.
# All rule IDs must be stable — do not rename once published.
# Rule structure: when (deterministic conditions) -> recommend (skill + required flag + reason)
version: "1.0"
skill_trigger_policy:
  rules:
    - id: skill-review-on-resume
      when:
        event: project_resume
      recommend:
        skill: mas-review
        required: true
        reason: Must review state, pending handoffs, and stale context when resuming a project.

    - id: skill-plan-before-execution
      when:
        phase: planning
        missing_artifact: planning/execution_plan.yaml
      recommend:
        skill: mas-plan
        required: true
        reason: Must maintain a current execution plan before entering execution.

    - id: skill-clarify-open-questions
      when:
        state_path_non_empty: decisions.open_questions
      recommend:
        skill: mas-clarify
        required: true
        reason: Must categorize open questions before proceeding.

    - id: skill-examine-before-policy-or-runtime-change
      when:
        touched_paths_any:
          - mas/policies/**
          - agents/**
          - skills/**
          - mas/core/**
      recommend:
        skill: mas-examine
        required: true
        reason: Must run read-only examination before policy, agent, skill, or core runtime modification.

    - id: skill-document-on-phase-close
      when:
        event: phase_close
      recommend:
        skill: mas-document
        required: true
        reason: Must produce durable documentation at phase close.

    - id: skill-postmortem-on-evaluation-fail
      when:
        status: "eval:fail"
      recommend:
        skill: mas-postmortem
        required: true
        reason: Must complete a postmortem after evaluation failure before retry or closure.
