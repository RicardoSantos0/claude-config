# ============================================================
# EVALUATION POLICY
# Defines how projects and agents are evaluated.
# ============================================================

evaluation_policy:

  # --- TRIGGER ---
  trigger: "Automatic after every project completion. Can be manually triggered."

  # --- MINIMUM METRICS (v1) ---
  minimum_metrics:
    goal_achievement:
      description: "Degree to which project goal was achieved"
      scale: "0-100"
      weight: 1.0
    acceptance_criteria_pass_rate:
      description: "Percentage of acceptance criteria met"
      scale: "0-100%"
      weight: 1.0
    handoff_acceptance_rate:
      description: "Percentage of handoffs accepted on first attempt"
      scale: "0-100%"
      weight: 1.0
    documentation_completeness:
      description: "Percentage of required documentation produced"
      scale: "0-100%"
      weight: 1.0
    boundary_violation_count:
      description: "Number of governance boundary violations detected"
      scale: "integer (lower is better)"
      weight: 1.0

  # --- QUALITATIVE SCORING RUBRIC ---
  decision_quality_rubric:
    "0-25": "Decisions undocumented or contradicted stated goals"
    "26-50": "Decisions documented but lacked rationale"
    "51-75": "Decisions documented with rationale"
    "76-100": "Decisions documented with rationale, alternatives, and traceability"

  # --- BENCHMARKS ---
  benchmarks:
    start_after_projects: 3  # Relative benchmarks after 3rd project
    before_benchmarks: "Use absolute rubric scales"

  # --- AGENT EVALUATION ---
  agent_evaluation:
    probation_threshold: 60  # Average score below this → probation flag
    exemplary_threshold: 90  # Score above this → flag output as exemplary

  # --- SPAWN OPPORTUNITY REVIEW ---
  # At project review/evaluation, Master MUST assess whether capability gaps
  # discovered during execution warrant a formal spawn proposal. This applies
  # even when Claude Code covered the gap — recurring gaps erode efficiency and
  # consistency across projects. A specialized agent will always outperform a
  # general-purpose executor for focused, repeated work.
  spawn_opportunity_review:
    when: "review phase — before evaluation handoff"
    trigger_conditions:
      - "HR issued a gap certificate or gap note during capability_discovery"
      - "A required capability was covered by Claude Code as a fallback (not a formal agent)"
      - "The same capability gap appeared in a prior project"
      - "The work performed was specialized enough that a domain-focused agent would reduce context overhead"
    assessment_questions:
      - "Is this capability likely to be needed in future projects?"
      - "Would a specialized agent deliver more consistent, focused output than a general executor?"
      - "Is the scope of the capability narrow enough to fit a well-defined agent definition?"
      - "Does the spawning policy (max 3/project, 1/phase) allow a spawn here?"
    outcomes:
      spawn_proposal: "Forward gap cert to spawner_agent if all trigger conditions and policy allow"
      defer: "Log the gap and threshold — trainer_agent may surface it after 2+ recurrences"
      no_action: "Document reasoning — gap was project-specific and unlikely to recur"
    record_in: "decisions.decision_log with rationale and alternatives_considered"

  # --- GRAPH CONTRIBUTION (prop-0515a6a5, prop-f3b3a7e9, prop-f53c0198) ---
  graph_contribution:
    status: "deprecated"
    required_at_closure: false
    note: >
      global_graph_contribution is excluded from project scoring until a SQL-native
      replacement for graph memory is implemented. Do not use this metric as a live
      quality signal.
    improvement_trigger: "Revisit once SQL-backed memory replacement is implemented"

  # --- DRY-RUN METRIC HANDLING ---
  # Some metrics have no meaningful signal on dry-run projects (no live LLM calls).
  # MetricsEngine.evaluate_project() automatically promotes these to mode='not_applicable'
  # so they are excluded from the project score average.
  dry_run_metrics:
    not_applicable_when_dry_run:
      - goal_achievement          # scores 0 or 50 — no task output to match against criteria
      - acceptance_criteria_pass_rate  # scores 50 — no agent ran AC tests
      - scope_adherence           # scores 50 — no scope deviation possible without real work
      - decision_quality          # scores 50 — no real decisions logged
      - documentation_completeness  # scores 0 — scribe not invoked in simulation
      - global_graph_contribution   # deprecated metric — always excluded pending SQL-native replacement
    detection: "MetricsEngine._is_dry_run_state() checks query_token_usage().live_calls == 0"
    always_scored:
      - phase_efficiency    # based on handoff structure, valid even dry-run
      - record_integrity    # based on governance violations, valid even dry-run

  # --- TOKEN TRACKING ---
  token_tracking:
    enabled: true
    field: "token_usage"
    location: "handoff_record"
    purpose: "Cost analysis, not enforcement in v1"

  # --- COMMUNICATION EFFICIENCY DIMENSION ---
  # Scored by MetricsEngine after every project. Advisory only — low scores
  # produce training proposals, never governance violations.
  communication_efficiency:
    enabled: true
    weight: 0.5  # Half-weight relative to core metrics (comms is secondary concern)
    low_score_threshold: 65
    metrics:
      token_efficiency:
        description: "Ratio of information density to raw token cost across handoff payloads"
        source: "communication.total_tokens_used + workflow.handoff_history"
        scoring: "Higher = more information per token. Penalised for large prose payloads."
        training_proposal_type: "communication_waste"
      payload_density:
        description: "Average meaningful field count per handoff payload vs. total field count"
        source: "workflow.handoff_history[].payload"
        scoring: "Higher = less noise. Empty fields and prose summaries reduce score."
        training_proposal_type: "communication_waste"
      context_injection_efficiency:
        description: "Ratio of state fields actually used in agent tasks to total fields injected"
        source: "prompt_assembler STATE_PROJECTIONS + workflow.handoff_history"
        scoring: "Higher = tighter projections. Over-injection reduces score."
        training_proposal_type: "context_bloat"
      consultation_overhead:
        description: "Token cost of consultation rounds as fraction of total project token spend"
        source: "consultation.consultation_responses + communication.total_tokens_used"
        scoring: "Lower overhead = higher score. Long prose reasoning reduces score."
        training_proposal_type: "context_bloat"
    wire_compliance:
      description: "Fraction of handoff payloads using wire protocol encoding"
      source: "communication.wire_compliance_rate"
      enforcement: "metric_only"
      note: >
        Wire non-compliance is tracked and reported but is NEVER a governance violation.
        Non-compliant payloads are accepted and processed normally.
        Low compliance produces a training proposal via training_engine.generate_communication_proposals().
