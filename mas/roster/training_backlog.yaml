  description: >
    In proj-20260425-001, the sprint plan specified "Click CliRunner" as the CLI test
    utility. The package uses argparse (not Click). CliRunner is Click-specific and does
    not apply to argparse CLIs. The spec error propagated into initial test scaffolding,
