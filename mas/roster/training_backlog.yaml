  tradeoffs: Adds one verification bullet to PM guidance. Prevents a class of spec errors.
  rejection_reason: ''

- proposal_id: TP-014
  title: "Handoff ID Persistence — Subagent Handoffs in Unix Path Mode Do Not Survive Session Boundary"
  target_agent: system
  target_artifact: mas/core/engine/handoff_engine.py
  priority: high
  status: applied
  systemic: true
