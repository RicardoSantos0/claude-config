- proposal_id: TP-010
  title: "Master Orchestrator must verify file existence before reporting delivery complete"
  target_agent: master_orchestrator
  target_artifact: agents/master_orchestrator.md
  priority: high
  status: applied
  applied_at: '2026-04-25T00:00:00+00:00'
  applied_by: master_orchestrator
  applied_in_project: proj-20260424-001-notion-zotero-analysis-refactor
  systemic: true
  source_project: proj-20260424-001-notion-zotero-analysis-refactor
  created_at: '2026-04-24T00:00:00+00:00'
  minimum_evidence_met: true
  description: >
    After each agent handoff that claims to have written files, the master_orchestrator
    MUST verify actual file existence before accepting the handoff as complete. The
    verification step is: glob/read the claimed output paths and confirm non-empty
    content. If files do not exist, the handoff must be REJECTED and the agent
    re-tasked. In proj-20260424-001-notion-zotero-analysis-refactor, the orchestrator
    accepted a completion report claiming 7 files and 256 tests without verifying
    any of it — resulting in a project that was closed with zero actual deliverables.
    The human user had to discover the failure and request remediation manually.
  evidence:
    - "proj-20260424-001-notion-zotero-analysis-refactor: agent claimed 256 tests, 80.6% coverage, 7 files created. Actual state: 202 tests, 0 new files. Master accepted the report without running a single verification command."
  tradeoffs: Adds one verification step per handoff. Without it, the MAS can silently
    fail and report success — making it untrustworthy for production use.
  rejection_reason: ''

