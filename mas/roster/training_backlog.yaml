- proposal_id: prop-acl-001
  proposal_type: efficiency_improvement
  priority: 3
  target_agent: system
  target_artifact: mas/core/cli.py
  description: 'No CLI command to backfill the FTS5 index for large existing databases.
    After init_db() adds the FTS5 table, existing rows are not automatically indexed
    (trigger only fires on new inserts). Manual Python invocation required.'
  recommended_change: Add `mas db rebuild-fts` subcommand that runs `INSERT INTO
    agent_events_fts(agent_events_fts) VALUES ("rebuild")` against episodic.db. Safe
    to run multiple times (idempotent rebuild).
  evidence:
  - proj-20260415-001-db-semantic-and-acl-fix
  tradeoffs: Minimal — CLI surface area increases by one command. Rebuild on 619 rows
    takes < 1s.
  minimum_evidence_met: true
  systemic: false
  status: pending
  rejection_reason: ''
  original_proposal_id: ''
  created_at: '2026-04-15T10:05:00.000000+00:00'
  project_ids:
  - proj-20260415-001-db-semantic-and-acl-fix
