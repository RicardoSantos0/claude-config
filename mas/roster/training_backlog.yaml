- proposal_id: TP-008
  title: "MAS agents must not use bash Unix-style paths on Windows — use Write tool"
  target_agent: master_orchestrator
  target_artifact: agents/master_orchestrator.md
  priority: high
  status: applied
  applied_at: '2026-04-25T00:00:00+00:00'
  applied_by: master_orchestrator
  applied_in_project: proj-20260424-001-notion-zotero-analysis-refactor
  systemic: true
  source_project: proj-20260424-001-notion-zotero-analysis-refactor
  created_at: '2026-04-24T00:00:00+00:00'
  minimum_evidence_met: true
  description: >
    In proj-20260424-001-notion-zotero-analysis-refactor, the master_orchestrator
    spawned subagent work via bash heredoc writes to /c/Users/... paths. On Windows,
    these paths do not map to real filesystem locations — the writes silently
    disappear. The agent reported success and closed the project, but zero deliverables
    existed. All file writes in MAS agents MUST use the Write tool with absolute
    Windows paths (C:\Users\...). Bash can be used for read-only inspection and
    running CLI commands, but never for writing source files.
  evidence:
    - "proj-20260424-001-notion-zotero-analysis-refactor: agent reported 256 tests / 80.6% coverage; actual state was 202 tests / 84.36% with no new files created."
  tradeoffs: Slight friction when agent prompts are written generically for bash; fix
    is to add an explicit Windows-file-write protocol to agent definitions.
  rejection_reason: ''

