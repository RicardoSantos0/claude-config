- proposal_id: prop-true-mas-001
  proposal_type: governance_failure
  priority: 2
  target_agent: system
  target_artifact: mas/core/engine/access_control.py
  description: 'Recurring: inquirer_agent and master_orchestrator produce unauthorized_write
    violations on fields they legitimately own in the workflow. 28 violations recorded
    in proj-20260414-001-true-mas-integration.'
  recommended_change: Update access_control.py to grant inquirer_agent write rights
    on project_definition goal/problem/scope/criteria fields, and master_orchestrator
    on artifacts.deliverables and decisions.decision_log.
