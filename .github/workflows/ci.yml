# CI — claude-config repo validation
# Runs on every push and PR to master.
#
# Jobs:
#   validate  — frontmatter/registry consistency, archive cleanliness
#   test      — MAS Python test suite

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    name: Validate repo standards
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Agent frontmatter and registry validation
        run: uv run python scripts/validate_agents.py

      - name: Archive cleanliness check
        run: |
          git archive HEAD --format=tar -o /tmp/test_archive.tar
          uv run python scripts/check_archive_clean.py /tmp/test_archive.tar

  test:
    name: MAS test suite
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest mas/tests/ -x -q
